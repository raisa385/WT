<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>LAB TASK 4</title>
    </head>

    <body>
        <h1>Form</h1><br>

        <form action="#" method="post">

            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email"><br><br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password"><br><br>

                <label for="date">Date of Birth:</label>
                <input type="date" id="date" name="date"><br><br>

                <fieldset>
                    <legend>Gender</legend>

                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                </fieldset>

            </fieldset><br>

            <fieldset>
                <legend>Academic Information</legend>

                <label for="department">Department:</label>
                <select id="department" name="department" required>
                    <option value="">--Select--</option>
                    <option value="CSE">CSE</option>
                    <option value="DS">DS</option>
                    <option value="Physics">Physics</option>
                    <option value="Mathematics">Mathematics</option>
                </select><br><br>
                
                <label for="skill">Select your skills:</label><br>
                <input type="checkbox" id="skill1" name="skill1" value="GC">
                <label for="skill1">Good Communication</label><br>

                <input type="checkbox" id="skill2" name="skill2" value="ETM">
                <label for="skill2">Efficient Time Management</label><br>
                
                <input type="checkbox" id="skill3" name="skil3" value="PS">
                <label for="skill3">Problem Solver</label><br>
            </fieldset><br>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </body>
</html>
